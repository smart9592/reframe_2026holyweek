function getToday(){
  const n=new Date();
  return DAYS.findIndex(d=>d.month===n.getMonth()+1&&d.day===n.getDate()&&n.getFullYear()===2026);
}
function getCurTimeT(dayIdx){
  const ti=getToday();
  if(ti!==dayIdx)return null;
  const h=new Date().getHours();
  let best=null,bh=-1;
  DAYS[dayIdx].times.forEach(t=>{const th=parseInt(t.t);if(th<=h&&th>bh){bh=th;best=t.t;}});
  return best;
}
function fmtDate(m,d){return`${m}월 ${d}일`;}

let curSlide=0;
const totalSlides=DAYS.length;

function buildSlide(idx){
  const day=DAYS[idx];
  const isToday=getToday()===idx;
  const curT=getCurTimeT(idx);
  const div=document.createElement('div');
  div.className='slide';
  div.id=`slide_${idx}`;

  let timesHtml=day.times.map((ti,ti_i)=>{
    const isCur=isToday&&curT===ti.t;
    const noteHtml=ti.note?`<span class="time-note">(${ti.note})</span>`:'';
    const curDotHtml=isCur?`<div class="cur-dot"></div>`:'';
    const versesHtml=ti.entries.map(e=>`
      <div class="book-tag">${e.book}</div>
      ${e.verses.map(v=>`<div class="verse-row"><span class="vn">${v.n}</span><span class="vt">${v.v}</span></div>`).join('')}
    `).join('');
    const openClass=isCur?'open':'';
    const hlClass=isCur?' highlight':'';
    return`<div class="time-block">
      <div class="time-toggle${hlClass}" onclick="toggleT(${idx},${ti_i})">
        ${curDotHtml}
        <div class="time-badge${isCur?' current':''}">${ti.t}${noteHtml}</div>
        <div class="time-books">${ti.books}</div>
        <div class="time-arrow ${openClass}" id="arr_${idx}_${ti_i}">▾</div>
      </div>
      <div class="scripture-wrap ${openClass}" id="sw_${idx}_${ti_i}">${versesHtml}</div>
    </div>`;
  }).join('');

  const paschBanner=day.special?`<div class="pasch-banner"><div class="pasch-line1">예수님이 부활하셨다!</div><div class="pasch-line2">He is risen indeed</div></div>`:'';

  div.innerHTML=`
    <div class="day-header">
      <div class="day-header-inner">
        <div class="church-label">Reframe Church · HOLY WEEK 2026</div>
        <div class="day-name">${day.name}</div>
        <div class="day-date">${day.weekday} · ${fmtDate(day.month,day.day)}</div>
        ${isToday?`<div class="today-chip">오늘</div>`:''}
      </div>
      <div class="dots" id="dots_${idx}"></div>
      <div class="swipe-hint" id="swhint_${idx}"></div>
    </div>
    <div class="times-list">${timesHtml}${paschBanner}</div>
  `;
  return div;
}

function buildDots(activeIdx){
  DAYS.forEach((_,i)=>{
    const dotsEl=document.getElementById(`dots_${i}`);
    if(dotsEl)dotsEl.innerHTML=DAYS.map((_,j)=>{
      const isPasch=j===DAYS.length-1;
      const isActive=j===activeIdx;
      return`<div class="dot${isActive?' active':''}${isPasch?' pasch':''}" onclick="goTo(${j})"></div>`;
    }).join('');
    const hint=document.getElementById(`swhint_${i}`);
    if(!hint)return;
    const prev=activeIdx>0?DAYS[activeIdx-1]:null;
    const next=activeIdx<DAYS.length-1?DAYS[activeIdx+1]:null;
    let html='';
    if(prev)html+=`<span class="swipe-arrow">←</span><span class="swipe-day-label prev">${prev.name}</span>`;
    if(prev&&next)html+=`<div class="swipe-divider"></div>`;
    if(next)html+=`<span class="swipe-day-label next">${next.name}</span><span class="swipe-arrow">→</span>`;
    hint.innerHTML=html;
  });
}

function toggleT(slideIdx,timeIdx){
  const sw=document.getElementById(`sw_${slideIdx}_${timeIdx}`);
  const ar=document.getElementById(`arr_${slideIdx}_${timeIdx}`);
  const open=sw.classList.toggle('open');
  ar.classList.toggle('open',open);
}

const slider=document.getElementById('slider');
DAYS.forEach((_,i)=>slider.appendChild(buildSlide(i)));

function goTo(idx,animate=true){
  if(idx<0||idx>=totalSlides)return;
  curSlide=idx;
  slider.style.transition=animate?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  slider.style.transform=`translateX(-${idx*100}%)`;
  buildDots(idx);
  const el=document.getElementById(`slide_${idx}`);
  if(el)setTimeout(()=>el.scrollTop=0,50);
}

const todayIdx=getToday();
goTo(todayIdx>=0?todayIdx:0,false);

const wrap=document.getElementById('sliderWrap');
let startX=0,startY=0,isDragging=false,isScrolling=false;
wrap.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;isDragging=true;isScrolling=false;},{passive:true});
wrap.addEventListener('touchmove',e=>{
  if(!isDragging)return;
  const dx=e.touches[0].clientX-startX;
  const dy=e.touches[0].clientY-startY;
  if(!isScrolling&&Math.abs(dy)>Math.abs(dx)*1.2){isScrolling=true;}
  if(!isScrolling&&Math.abs(dx)>8){e.preventDefault();}
},{passive:false});
wrap.addEventListener('touchend',e=>{
  if(!isDragging||isScrolling){isDragging=false;return;}
  const dx=e.changedTouches[0].clientX-startX;
  if(Math.abs(dx)>50){
    if(dx<0&&curSlide<totalSlides-1)goTo(curSlide+1);
    else if(dx>0&&curSlide>0)goTo(curSlide-1);
  }
  isDragging=false;
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&curSlide<totalSlides-1)goTo(curSlide+1);
  if(e.key==='ArrowLeft'&&curSlide>0)goTo(curSlide-1);
});
</script>
